prompt: "Deploy the provided manifests to cluster {{cluster_name}} in project {{project_name}}.\n\n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  labels:\n    app: hypercomputer-d1-vllm-server\n  name: hypercomputer-d1-vllm-server\n  namespace: default\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: hypercomputer-d1-vllm-server\n  template:\n    metadata:\n      annotations:\n        gke-gcsfuse/volumes: 'true'\n      labels:\n        app: hypercomputer-d1-vllm-server\n    spec:\n      automountServiceAccountToken: true\n      containers:\n      - args:\n        - python3 -m vllm.entrypoints.openai.api_server\n          --model /data/model/google-gemma-3-12b-it --served-model-name google-gemma-3-12b-it\n          --host 0.0.0.0 --port 8000 --trust-remote-code\n          --quantization fp8\n        command:\n        - /bin/bash\n        - -c\n        image: vllm/vllm-openai:latest\n        name: vllm\n        ports:\n        - containerPort: 8000\n          protocol: TCP\n        readinessProbe:\n          failureThreshold: 30\n          httpGet:\n            path: /health\n            port: 8000\n            scheme: HTTP\n          initialDelaySeconds: 60\n          periodSeconds: 10\n          successThreshold: 1\n          timeoutSeconds: 5\n        resources:\n          limits:\n            nvidia.com/gpu: '1'\n          requests:\n            cpu: '2'\n        volumeMounts:\n        - mountPath: /data/model\n          mountPropagation: None\n          name: model-volume\n          readOnly: true\n      serviceAccount: hypercomputer-d1-vllm-sa\n      serviceAccountName: hypercomputer-d1-vllm-sa\n      shareProcessNamespace: false\n      terminationGracePeriodSeconds: 30\n      tolerations:\n      - effect: NoSchedule\n        key: nvidia.com/gpu\n        operator: Exists\n      volumes:\n      - csi:\n          driver: gcsfuse.csi.storage.gke.io\n          fsType: ''\n          readOnly: false\n          volumeAttributes:\n            bucketName: hypercomputer-d1-models-n26-genkey-aihypercomputer\n            mountOptions: implicit-dirs\n        name: model-volume\n\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: hypercomputer-d1-vllm-service\n  namespace: default\nspec:\n  ports:\n  - port: 8000\n    protocol: TCP\n    targetPort: 8000\n  selector:\n    app: hypercomputer-d1-vllm-server\n  type: ClusterIP\n\n---\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\n  name: hypercomputer-d1-vllm-hpa\n  namespace: default\nspec:\n  maxReplicas: 10\n  metrics:\n  - resource:\n      name: cpu\n      target:\n        averageUtilization: 60\n        type: Utilization\n    type: Resource\n  minReplicas: 1\n  scaleTargetRef:\n    apiVersion: apps/v1\n    kind: Deployment\n    name: hypercomputer-d1-vllm-server\n```"